<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sally! 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a0a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Quicksand', sans-serif; }
  #slideshow { position: relative; width: 100%; max-width: 680px; margin: 0 auto; padding: 10px; }
  #stage { position: relative; width: 100%; padding-bottom: 75%; background: #1a0a2e; border-radius: 16px; overflow: hidden; }
  .slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 1s ease; }
  .slide.active { opacity: 1; }
  .slide img { width: 100%; height: 100%; object-fit: cover; }
  .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.55) 100%); }
  .caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 20px 20px; text-align: center; z-index: 2; }
  .caption h1 { font-family: 'Pacifico', cursive; color: #FFD700; font-size: clamp(18px, 5vw, 36px); text-shadow: 2px 2px 8px rgba(0,0,0,0.8); line-height: 1.3; }
  .caption p { color: #fff; font-size: clamp(12px, 3vw, 18px); font-weight: 600; margin-top: 6px; text-shadow: 1px 1px 6px rgba(0,0,0,0.9); }
  .confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; top: -10px; animation: fall linear infinite; pointer-events: none; z-index: 3; }
  @keyframes fall { to { transform: translateY(110%) rotate(720deg); opacity: 0; } }
  #dots { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: background 0.3s; }
  .dot.active { background: #FFD700; }
  #controls { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
  #controls button { font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 600; padding: 8px 20px; border-radius: 20px; border: 1.5px solid #FFD700; background: transparent; color: #FFD700; cursor: pointer; transition: background 0.2s, color 0.2s; }
  #controls button:hover { background: #FFD700; color: #1a0a2e; }
  #final { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 1.5s; background: #1a0a2e; border-radius: 16px; z-index: 10; pointer-events: none; padding: 20px; text-align: center; }
  #final.show { opacity: 1; pointer-events: all; }
  #final h2 { font-family: 'Pacifico', cursive; color: #FFD700; font-size: clamp(20px, 6vw, 42px); line-height: 1.4; text-shadow: 0 0 30px rgba(255,215,0,0.6); }
  #final p { color: #fff; font-size: clamp(14px, 3.5vw, 22px); font-weight: 600; margin-top: 12px; line-height: 1.6; }
  #final .heart { font-size: clamp(28px, 8vw, 56px); animation: pulse 1s ease-in-out infinite alternate; display: block; margin-top: 16px; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }
  .star { position: absolute; color: #FFD700; animation: twinkle 2s ease-in-out infinite alternate; font-size: 16px; }
  @keyframes twinkle { from { opacity: 0.2; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
</style>
</head>
<body>
<div id="slideshow">
  <div id="stage">
    <div class="slide active" id="s0">
      <img src="IMG-20250914-WA0006.jpg" alt="Sally with chick" />
      <div class="overlay"></div>
    </div>
    <div class="slide" id="s1">
      <img src="IMG20220629082019.jpg" alt="Sally on bike" />
      <div class="overlay"></div>
    </div>
    <div class="slide" id="s2">
      <img src="IMG20220629200047.jpg" alt="Dad and Sally picnic" />
      <div class="overlay"></div>
    </div>
    <div class="slide" id="s3">
      <img src="IMG20220629200129.jpg" alt="Dad and Sally laughing" />
      <div class="overlay"></div>
    </div>
    <div class="slide" id="s4">
      <img src="IMG20220629200204.jpg" alt="Dad and Sally silly" />
      <div class="overlay"></div>
    </div>
    <div class="slide" id="s5">
      <img src="IMG20230728133047-COLLAGE.jpg" alt="Family collage" />
      <div class="overlay"></div>
    </div>
    <div class="slide" id="s6">
      <img src="IMG20230728133047.jpg" alt="Family selfie" />
      <div class="overlay"></div>
    </div>

    <div class="caption" id="caption">
      <h1 id="cap-title">Happy Birthday Sally! 🎂</h1>
      <p id="cap-sub">8 years old today!</p>
    </div>
  </div>

  <div id="final">
    <span class="star" style="top:10%; left:8%; animation-delay:0s;">★</span>
    <span class="star" style="top:15%; right:10%; animation-delay:0.5s;">★</span>
    <span class="star" style="top:40%; left:5%; animation-delay:1s;">✦</span>
    <span class="star" style="bottom:20%; right:8%; animation-delay:0.3s;">★</span>
    <span class="star" style="bottom:30%; left:12%; animation-delay:0.8s;">✦</span>
    <h2>Happy Birthday<br>Sally!</h2>
    <p>8 years old today! 🎉<br><br>Love from your Daddy 💛<br><br>Sleep tight and don't let<br>the bed bugs bite! 😆</p>
    <span class="heart">❤️</span>
  </div>

  <div id="dots"></div>
  <div id="controls">
    <button id="prevBtn">← Prev</button>
    <button id="playBtn">⏸ Pause</button>
    <button id="nextBtn">Next →</button>
  </div>
</div>

<script>
const captions = [
  { title: "Happy Birthday Sally! 🎂", sub: "8 years old today!" },
  { title: "Our little superstar 🌟", sub: "Always so full of life!" },
  { title: "Best days together ☀️", sub: "Daddy's favourite moments" },
  { title: "That smile lights up the world 😄", sub: "We love you so much!" },
  { title: "Silly & wonderful 😜", sub: "Never stop being you!" },
  { title: "So many memories 📸", sub: "Every moment is precious!" },
  { title: "Love you to the moon & back 🌙", sub: "Happy 8th Birthday!" },
];

const totalSlides = 7;
let current = 0;
let playing = true;
let timer = null;
const confettiColors = ['#FFD700','#FF6B9D','#7EC8E3','#A78BFA','#34D399','#FB923C'];

const dotsEl = document.getElementById('dots');
for (let i = 0; i < totalSlides; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => { goTo(i); if (playing) startTimer(); });
  dotsEl.appendChild(d);
}

function goTo(n) {
  document.getElementById('s' + current).classList.remove('active');
  dotsEl.children[current].classList.remove('active');
  current = (n + totalSlides) % totalSlides;
  document.getElementById('s' + current).classList.add('active');
  dotsEl.children[current].classList.add('active');
  document.getElementById('cap-title').textContent = captions[current].title;
  document.getElementById('cap-sub').textContent = captions[current].sub;
}

function next() {
  if (current === totalSlides - 1) { showFinal(); return; }
  goTo(current + 1);
}

function showFinal() {
  clearInterval(timer);
  playing = false;
  document.getElementById('final').classList.add('show');
  launchConfetti(80);
}

function launchConfetti(count) {
  const stage = document.getElementById('stage');
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
    c.style.animationDuration = (2 + Math.random() * 3) + 's';
    c.style.animationDelay = (Math.random() * 2) + 's';
    c.style.width = (6 + Math.random() * 6) + 'px';
    c.style.height = (6 + Math.random() * 6) + 'px';
    stage.appendChild(c);
  }
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => { if (playing) next(); }, 3500);
}

document.getElementById('prevBtn').addEventListener('click', () => { goTo(current - 1); if (playing) startTimer(); });
document.getElementById('nextBtn').addEventListener('click', () => { next(); if (playing) startTimer(); });
document.getElementById('playBtn').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? '⏸ Pause' : '▶ Play';
  if (playing) startTimer(); else clearInterval(timer);
});

launchConfetti(30);
startTimer();
</script>
</body>
</html>
